<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7DBCDB"/>
      <stop offset="100%" stop-color="#8A65C4"/>
    </linearGradient>
    <linearGradient id="p1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7DBCDB" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7DBCDB" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="p2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8A65C4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#8A65C4" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="p3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7DBCDB" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8A65C4" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!--
    Isometric platforms (3 layers, top-down isometric view)
    Each platform = diamond (rhombus) = 4 points: top, right, bottom, left
    Layer 1 (bottom, large):  center(256,360), rx=195, ry=75
    Layer 2 (middle):         center(256,260), rx=145, ry=56
    Layer 3 (top, small):     center(256,168), rx=95, ry=37
  -->

  <!-- Layer 1 — bottom platform -->
  <!-- Thickness sides -->
  <polygon points="256,285 451,360 451,385 256,310" fill="#7DBCDB" opacity="0.07"/>
  <polygon points="256,285 61,360 61,385 256,310" fill="#8A65C4" opacity="0.07"/>
  <!-- Top face -->
  <polygon points="256,285 451,360 256,435 61,360" fill="url(#p1)" stroke="url(#g)" stroke-width="1.5" opacity="0.9"/>
  <!-- Corner dots -->
  <circle cx="256" cy="285" r="5" fill="#7DBCDB" opacity="0.7"/>
  <circle cx="451" cy="360" r="5" fill="#7DBCDB" opacity="0.5"/>
  <circle cx="256" cy="435" r="5" fill="#8A65C4" opacity="0.4"/>
  <circle cx="61"  cy="360" r="5" fill="#8A65C4" opacity="0.5"/>

  <!-- Layer 2 — middle platform -->
  <!-- Thickness -->
  <polygon points="256,204 401,260 401,278 256,222" fill="#7DBCDB" opacity="0.09"/>
  <polygon points="256,204 111,260 111,278 256,222" fill="#8A65C4" opacity="0.09"/>
  <!-- Top face -->
  <polygon points="256,204 401,260 256,316 111,260" fill="url(#p2)" stroke="url(#g)" stroke-width="1.5" opacity="0.9"/>
  <!-- Corner dots -->
  <circle cx="256" cy="204" r="5" fill="#7DBCDB" opacity="0.75"/>
  <circle cx="401" cy="260" r="5" fill="#7DBCDB" opacity="0.55"/>
  <circle cx="111" cy="260" r="5" fill="#8A65C4" opacity="0.55"/>

  <!-- Layer 3 — top platform -->
  <!-- Thickness -->
  <polygon points="256,131 351,168 351,182 256,145" fill="#7DBCDB" opacity="0.12"/>
  <polygon points="256,131 161,168 161,182 256,145" fill="#8A65C4" opacity="0.12"/>
  <!-- Top face -->
  <polygon points="256,131 351,168 256,205 161,168" fill="url(#p3)" stroke="url(#g)" stroke-width="2" opacity="0.95"/>
  <!-- Corner dots -->
  <circle cx="256" cy="131" r="6" fill="#7DBCDB" filter="url(#glow)"/>
  <circle cx="351" cy="168" r="5" fill="#7DBCDB" filter="url(#glow)" opacity="0.8"/>
  <circle cx="161" cy="168" r="5" fill="#8A65C4" filter="url(#glow)" opacity="0.8"/>
  <circle cx="256" cy="205" r="5" fill="#8A65C4" opacity="0.65"/>

  <!-- Vertical connection lines between layers -->
  <line x1="256" y1="205" x2="256" y2="285" stroke="url(#g)" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>
  <line x1="256" y1="316" x2="256" y2="285" stroke="url(#g)" stroke-width="1" opacity="0.25"/>

  <!-- Cloud symbol above top layer -->
  <path d="M226 110 C226 96 236 88 248 90 C250 82 258 76 268 78 C276 72 288 74 292 84 C300 84 306 90 304 98 C308 100 310 106 306 110 Z"
        fill="url(#g)" opacity="0.18" stroke="url(#g)" stroke-width="1.5"/>
  <circle cx="240" cy="100" r="14" fill="#7DBCDB" opacity="0.08" stroke="url(#g)" stroke-width="1.5"/>
  <circle cx="258" cy="94"  r="16" fill="#8A65C4" opacity="0.1"  stroke="url(#g)" stroke-width="1.5"/>
  <circle cx="276" cy="100" r="13" fill="#7DBCDB" opacity="0.08" stroke="url(#g)" stroke-width="1.5"/>
  <rect x="231" y="100" width="90" height="18" rx="2" fill="url(#g)" opacity="0.1"/>
  <!-- Clean cloud outline only -->
  <path d="M234 112 C230 112 224 107 226 100 C228 93 236 90 242 93 C244 85 252 80 262 82 C266 76 276 76 280 84 C287 84 292 90 289 97 C293 100 293 108 288 112 Z"
        stroke="url(#g)" stroke-width="2" fill="none" opacity="0.55"/>
</svg>
