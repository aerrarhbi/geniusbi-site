<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7DBCDB"/>
      <stop offset="100%" stop-color="#8A65C4"/>
    </linearGradient>
    <radialGradient id="rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7DBCDB" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8A65C4" stop-opacity="0.5"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer node positions (8 nodes in circle at r=175) -->
  <!-- 0°=top, 45°, 90°=right, 135°, 180°=bottom, 225°, 270°=left, 315° -->
  <!-- N:  256, 81  -->
  <!-- NE: 380, 132 -->
  <!-- E:  431, 256 -->
  <!-- SE: 380, 380 -->
  <!-- S:  256, 431 -->
  <!-- SW: 132, 380 -->
  <!-- W:  81,  256 -->
  <!-- NW: 132, 132 -->

  <!-- Connection lines outer to center -->
  <line x1="256" y1="81"  x2="256" y2="256" stroke="url(#g)" stroke-width="1.5" opacity="0.3"/>
  <line x1="380" y1="132" x2="256" y2="256" stroke="url(#g)" stroke-width="1.5" opacity="0.3"/>
  <line x1="431" y1="256" x2="256" y2="256" stroke="url(#g)" stroke-width="1.5" opacity="0.3"/>
  <line x1="380" y1="380" x2="256" y2="256" stroke="url(#g)" stroke-width="1.5" opacity="0.3"/>
  <line x1="256" y1="431" x2="256" y2="256" stroke="url(#g)" stroke-width="1.5" opacity="0.3"/>
  <line x1="132" y1="380" x2="256" y2="256" stroke="url(#g)" stroke-width="1.5" opacity="0.3"/>
  <line x1="81"  y1="256" x2="256" y2="256" stroke="url(#g)" stroke-width="1.5" opacity="0.3"/>
  <line x1="132" y1="132" x2="256" y2="256" stroke="url(#g)" stroke-width="1.5" opacity="0.3"/>

  <!-- Connection ring (outer nodes connected) -->
  <polygon points="256,81 380,132 431,256 380,380 256,431 132,380 81,256 132,132"
           stroke="url(#g)" stroke-width="1" opacity="0.18"/>

  <!-- Mid ring nodes (r=100) -->
  <!-- N: 256,156 — E: 356,256 — S: 256,356 — W: 156,256 -->
  <line x1="256" y1="156" x2="256" y2="256" stroke="url(#g)" stroke-width="1" opacity="0.2"/>
  <line x1="356" y1="256" x2="256" y2="256" stroke="url(#g)" stroke-width="1" opacity="0.2"/>
  <line x1="256" y1="356" x2="256" y2="256" stroke="url(#g)" stroke-width="1" opacity="0.2"/>
  <line x1="156" y1="256" x2="256" y2="256" stroke="url(#g)" stroke-width="1" opacity="0.2"/>

  <!-- Mid nodes -->
  <circle cx="256" cy="156" r="7" fill="#7DBCDB" opacity="0.65"/>
  <circle cx="356" cy="256" r="7" fill="#8A65C4" opacity="0.65"/>
  <circle cx="256" cy="356" r="7" fill="#7DBCDB" opacity="0.55"/>
  <circle cx="156" cy="256" r="7" fill="#8A65C4" opacity="0.55"/>

  <!-- Outer nodes -->
  <circle cx="256" cy="81"  r="10" fill="#7DBCDB" filter="url(#glow)"/>
  <circle cx="380" cy="132" r="9"  fill="#8A65C4" filter="url(#glow)" opacity="0.85"/>
  <circle cx="431" cy="256" r="10" fill="#7DBCDB" filter="url(#glow)"/>
  <circle cx="380" cy="380" r="9"  fill="#8A65C4" opacity="0.7"/>
  <circle cx="256" cy="431" r="9"  fill="#7DBCDB" opacity="0.65"/>
  <circle cx="132" cy="380" r="9"  fill="#8A65C4" opacity="0.6"/>
  <circle cx="81"  cy="256" r="9"  fill="#7DBCDB" opacity="0.7"/>
  <circle cx="132" cy="132" r="9"  fill="#8A65C4" filter="url(#glow)" opacity="0.85"/>

  <!-- Speed lines (right side, energy direction) -->
  <line x1="431" y1="256" x2="490" y2="226" stroke="#7DBCDB" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="431" y1="256" x2="490" y2="256" stroke="#7DBCDB" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="431" y1="256" x2="490" y2="286" stroke="#7DBCDB" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Center glow -->
  <circle cx="256" cy="256" r="40" fill="url(#rg)" opacity="0.15" filter="url(#bigglow)"/>
  <!-- Center node large -->
  <circle cx="256" cy="256" r="28" fill="url(#g)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="14" fill="white" opacity="0.95"/>
</svg>
